<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Lectura - Mercedes-Benz Mobility</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #003366 0%, #0055A4 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 40px;
        }
        
        .confirmation-badge {
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            border: 2px solid #28a745;
        }
        
        .info-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #dee2e6;
        }
        
        .amount-highlight {
            background: #fff3cd;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin: 25px 0;
            border: 2px solid #ffc107;
        }
        
        .amount {
            font-size: 36px;
            font-weight: bold;
            color: #dc3545;
        }
        
        .bank-info {
            background: #e7f3ff;
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
            border-left: 5px solid #003366;
        }
        
        .footer {
            background: #f8f9fa;
            padding: 25px;
            text-align: center;
            color: #666;
            font-size: 13px;
            border-top: 2px solid #dee2e6;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Mercedes-Benz Mobility</h1>
            <p>Estado de Cuenta Oficial</p>
        </div>
        
        <div class="content" id="main-content">
            <div class="loading">Cargando información...</div>
        </div>
        
        <div class="footer">
            <p>© 2024 Mercedes-Benz Mobility México, S. de R.L. de C.V.</p>
            <p>Este documento es confidencial y contiene información privilegiada</p>
        </div>
    </div>
    
    <script>
        // Obtener parámetros de la URL
        function getParameterByName(name) {
            const url = window.location.href;
            name = name.replace(/[\[\]]/g, '\\$&');
            const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
            const results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }
        
        const cuenta = getParameterByName('cuenta') || 'No especificado';
        const nombre = getParameterByName('nombre') || 'Cliente';
        const monto = getParameterByName('monto') || '0';
        const fecha = new Date().toLocaleDateString('es-MX', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        
        const montoFormateado = new Intl.NumberFormat('es-MX', {
            style: 'currency',
            currency: 'MXN'
        }).format(parseFloat(monto));
        
        const contenidoHTML = `
            <div class="confirmation-badge">
                ✅ <strong>CONFIRMACIÓN DE LECTURA REGISTRADA</strong><br>
                <small>${fecha} | Contrato: ${cuenta}</small>
            </div>
            
            <div class="info-card">
                <h3>📋 Información del Cliente</h3>
                <p><strong>👤 Cliente:</strong> ${nombre}</p>
                <p><strong>🏢 Contrato:</strong> ${cuenta}</p>
                <p><strong>📅 Fecha de consulta:</strong> ${fecha}</p>
            </div>
            
            <div class="amount-highlight">
                <h3>⚠️ SALDO VENCIDO</h3>
                <div class="amount">${montoFormateado}</div>
                <p style="color: #856404; margin-top: 10px;">Pago requerido a la brevedad</p>
            </div>
            
            <div class="bank-info">
                <h3>🏦 Datos Bancarios para Pago</h3>
                <p><strong>Banco:</strong> BBVA</p>
                <p><strong>Beneficiario:</strong> Mercedes-Benz Mobility México</p>
                <p><strong>CLABE:</strong> 0129 1400 2020 528819</p>
                <p><strong>Referencia:</strong> ${cuenta}</p>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <p><strong>📞 Contacto:</strong> 800-649-0175</p>
                <p><strong>✉️ Email:</strong> mbfscobranza@mercedes-benz.com</p>
            </div>
        `;
        
        document.getElementById('main-content').innerHTML = contenidoHTML;
        
        // Enviar confirmación silenciosa (opcional)
        console.log('✅ CONFIRMACIÓN:', {
            contrato: cuenta,
            cliente: nombre,
            fecha: new Date().toISOString(),
            accion: 'LECTURA_CONFIRMADA'
        });
    </script>
</body>
</html>
